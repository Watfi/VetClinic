{% extends 'base.html' %}
{% block content %}
<div class="max-w-5xl mx-auto">
  <h1 class="text-3xl font-bold text-white mb-6"><i class="fas fa-cash-register text-olive-500 mr-2"></i> Nueva venta</h1>

  {% if messages %}{% for m in messages %}
    <div class="p-4 rounded-lg mb-4 {% if m.tags == 'error' %}bg-red-900/30 border border-red-700 text-red-300{% else %}bg-green-900/30 border border-green-700 text-green-300{% endif %}">{{ m }}</div>
  {% endfor %}{% endif %}

  <form method="post" class="space-y-6" onsubmit="return prepareSubmit()">
    {% csrf_token %}

    <div class="bg-dark-800 border border-dark-700 rounded-xl p-6 grid grid-cols-1 md:grid-cols-2 gap-4">
      <div>
        <label class="block text-sm text-gray-300 mb-1">Nombre cliente</label>
        <input id="clienteNombre" name="cliente_nombre" class="w-full bg-dark-900 border border-dark-700 rounded px-3 py-2 text-white" placeholder="Opcional">
      </div>
      <div>
        <label class="block text-sm text-gray-300 mb-1">Email cliente</label>
        <input id="clienteEmail" name="cliente_email" type="email" class="w-full bg-dark-900 border border-dark-700 rounded px-3 py-2 text-white" placeholder="Opcional">
      </div>
      <div>
        <label class="block text-sm text-gray-300 mb-1">Documento</label>
        <input name="cliente_documento" class="w-full bg-dark-900 border border-dark-700 rounded px-3 py-2 text-white" placeholder="Opcional">
      </div>
      <div>
        <label class="block text-sm text-gray-300 mb-1">Método de pago</label>
        <select name="metodo_pago" class="w-full bg-dark-900 border border-dark-700 rounded px-3 py-2 text-white">
          <option>Efectivo</option><option>Tarjeta</option><option>Transferencia</option>
        </select>
      </div>
      <div>
        <label class="block text-sm text-gray-300 mb-1">Impuestos %</label>
        <input name="impuestos_pct" type="number" step="0.01" min="0" value="0" class="w-full bg-dark-900 border border-dark-700 rounded px-3 py-2 text-white" oninput="recalc()" id="taxPct">
      </div>
    </div>

    <div class="bg-dark-800 border border-dark-700 rounded-xl p-6">
      <div class="flex items-center justify-between mb-4">
        <h2 class="text-xl font-bold text-white">Productos</h2>
        <div class="flex gap-2 relative" id="searchWrapper">
          <div class="relative">
            <input id="prodSearch" type="text" autocomplete="off"
                   placeholder="Buscar producto…"
                   oninput="filterProds()"
                   onkeydown="handleSearchKey(event)"
                   class="bg-dark-900 border border-dark-700 rounded px-3 py-2 text-white w-72 focus:outline-none focus:ring-2 focus:ring-olive-600">
            <ul id="prodDropdown"
                class="absolute left-0 top-full mt-1 w-full bg-dark-800 border border-dark-600 rounded-lg shadow-xl z-50 hidden max-h-64 overflow-y-auto">
            </ul>
          </div>
          <button type="button" onclick="addSelected()" class="px-3 py-2 rounded bg-olive-600 text-white"><i class="fas fa-plus"></i></button>
        </div>
      </div>
      <table class="w-full text-sm">
        <thead class="bg-dark-900 text-olive-400">
          <tr><th class="px-3 py-2 text-left">SKU</th><th class="px-3 py-2 text-left">Producto</th><th class="px-3 py-2 text-right">Precio</th><th class="px-3 py-2 text-center">Cantidad</th><th class="px-3 py-2 text-right">Subtotal</th><th></th></tr>
        </thead>
        <tbody id="itemsBody"></tbody>
      </table>
      <div class="mt-4 flex justify-end">
        <div class="w-72 space-y-1 text-right">
          <div class="text-gray-300">Subtotal: <span id="subtotal">$0.00</span></div>
          <div class="text-gray-300">Impuestos: <span id="taxAmt">$0.00</span></div>
          <div class="text-2xl font-bold text-white">Total: <span id="total">$0.00</span></div>
        </div>
      </div>
    </div>

    <div class="bg-dark-800 border border-dark-700 rounded-xl p-6 space-y-4">
      <div>
        <label class="block text-sm text-gray-300 mb-1">Notas</label>
        <textarea name="notas" rows="2" class="w-full bg-dark-900 border border-dark-700 rounded px-3 py-2 text-white"></textarea>
      </div>
      <div class="flex items-center gap-2">
        <input type="checkbox" id="send_email" name="send_email" checked>
        <label for="send_email" class="text-gray-300">Enviar factura PDF al email del cliente</label>
      </div>
    </div>

    <input type="hidden" name="items_json" id="items_json">
    <div class="flex justify-end gap-2">
      <a href="{% url 'list_ventas' %}" class="px-4 py-2 rounded bg-dark-700 text-white">Cancelar</a>
      <button class="px-6 py-2 rounded bg-olive-600 hover:bg-olive-500 text-white font-semibold">Registrar venta</button>
    </div>
  </form>
</div>

<script>
const _catalogue = [];
{% for p in productos %}
_catalogue.push({ id:"{{ p.id }}", nombre:"{{ p.nombre|escapejs }}", sku:"{{ p.sku|escapejs }}", precio:{{ p.precio }}, stock:{{ p.stock }} });
{% endfor %}

let selectedProd = null;
let highlightIdx = -1;
let filteredList = [];

function filterProds(){
  const q = document.getElementById('prodSearch').value.trim().toLowerCase();
  const ul = document.getElementById('prodDropdown');
  if(!q){ ul.classList.add('hidden'); filteredList = []; highlightIdx = -1; return; }
  filteredList = _catalogue.filter(p =>
    p.nombre.toLowerCase().includes(q) || p.sku.toLowerCase().includes(q)
  ).slice(0, 20);
  if(!filteredList.length){ ul.classList.add('hidden'); return; }
  highlightIdx = -1;
  renderDropdown();
  ul.classList.remove('hidden');
}

function renderDropdown(){
  const ul = document.getElementById('prodDropdown');
  ul.innerHTML = '';
  filteredList.forEach((p, i) => {
    const li = document.createElement('li');
    li.className = 'px-3 py-2 cursor-pointer text-sm text-white hover:bg-dark-700 flex justify-between items-center' + (i === highlightIdx ? ' bg-dark-700' : '');
    li.innerHTML = `<span><span class="text-olive-400 font-mono text-xs mr-2">${p.sku}</span>${p.nombre}</span><span class="text-gray-400 text-xs ml-2">$${parseFloat(p.precio).toFixed(2)} · stock:${p.stock}</span>`;
    li.addEventListener('mousedown', () => selectProd(p));
    ul.appendChild(li);
  });
}

function handleSearchKey(e){
  const ul = document.getElementById('prodDropdown');
  if(ul.classList.contains('hidden')) return;
  if(e.key === 'ArrowDown'){ e.preventDefault(); highlightIdx = Math.min(highlightIdx+1, filteredList.length-1); renderDropdown(); }
  else if(e.key === 'ArrowUp'){ e.preventDefault(); highlightIdx = Math.max(highlightIdx-1, 0); renderDropdown(); }
  else if(e.key === 'Enter'){ e.preventDefault(); if(highlightIdx >= 0) selectProd(filteredList[highlightIdx]); else if(filteredList.length === 1) selectProd(filteredList[0]); }
  else if(e.key === 'Escape'){ ul.classList.add('hidden'); }
}

function selectProd(p){
  selectedProd = p;
  document.getElementById('prodSearch').value = `${p.sku} · ${p.nombre}`;
  document.getElementById('prodDropdown').classList.add('hidden');
  filteredList = [];
}

document.addEventListener('click', e => {
  if(!document.getElementById('searchWrapper').contains(e.target)){
    document.getElementById('prodDropdown').classList.add('hidden');
  }
});

const items = [];

function addSelected(){
  if(!selectedProd){ document.getElementById('prodSearch').focus(); return; }
  const p = selectedProd;
  const existing = items.find(i => i.producto_id == p.id);
  if(existing){ existing.cantidad = Math.min(existing.cantidad + 1, p.stock); }
  else {
    items.push({ producto_id: p.id, nombre: p.nombre, sku: p.sku, precio: parseFloat(p.precio), stock: p.stock, cantidad: 1 });
  }
  selectedProd = null;
  document.getElementById('prodSearch').value = '';
  render();
}

function addItem(){
  addSelected();
}
function removeItem(i){ items.splice(i,1); render(); }
function changeQty(i, q){
  q = parseInt(q) || 1;
  if(q > items[i].stock) q = items[i].stock;
  if(q < 1) q = 1;
  items[i].cantidad = q;
  render();
}
function changePrice(i, p){
  p = parseFloat(p) || 0;
  if(p < 0) p = 0;
  items[i].precio = p;
  render();
}
function render(){
  const tb = document.getElementById('itemsBody');
  tb.innerHTML = '';
  items.forEach((it,i) => {
    const sub = (it.precio * it.cantidad).toFixed(2);
    tb.innerHTML += `<tr class="border-t border-dark-700">
      <td class="px-3 py-2 text-gray-300 font-mono">${it.sku}</td>
      <td class="px-3 py-2 text-white">${it.nombre}</td>
      <td class="px-3 py-2 text-right"><input type="number" min="0" step="0.01" value="${it.precio.toFixed(2)}" onchange="changePrice(${i}, this.value)" class="w-24 bg-dark-900 border border-dark-700 rounded px-2 py-1 text-white text-right"></td>
      <td class="px-3 py-2 text-center"><input type="number" min="1" max="${it.stock}" value="${it.cantidad}" onchange="changeQty(${i}, this.value)" class="w-16 bg-dark-900 border border-dark-700 rounded px-2 py-1 text-white text-center"></td>
      <td class="px-3 py-2 text-right text-white">$${sub}</td>
      <td class="px-3 py-2 text-right"><button type="button" onclick="removeItem(${i})" class="text-red-400"><i class="fas fa-times"></i></button></td>
    </tr>`;
  });
  recalc();
}
function recalc(){
  const sub = items.reduce((a,b) => a + b.precio * b.cantidad, 0);
  const pct = parseFloat(document.getElementById('taxPct').value) || 0;
  const tax = sub * pct / 100;
  document.getElementById('subtotal').textContent = '$' + sub.toFixed(2);
  document.getElementById('taxAmt').textContent = '$' + tax.toFixed(2);
  document.getElementById('total').textContent = '$' + (sub + tax).toFixed(2);
}
function prepareSubmit(){
  if(items.length === 0){ alert('Agrega al menos un producto.'); return false; }
  document.getElementById('items_json').value = JSON.stringify(items.map(i => ({producto_id: i.producto_id, cantidad: i.cantidad, precio_unitario: i.precio})));
  return true;
}
</script>
{% endblock %}
