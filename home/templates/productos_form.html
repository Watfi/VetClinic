{% extends 'base.html' %}
{% block content %}
<div class="max-w-3xl mx-auto">
  <h1 class="text-3xl font-bold text-white mb-6">
    <i class="fas fa-box text-olive-500 mr-2"></i>
    {% if producto %}Editar producto{% else %}Nuevo producto{% endif %}
  </h1>
  {% if messages %}{% for m in messages %}
    <div class="p-4 rounded-lg mb-4 {% if m.tags == 'error' %}bg-red-900/30 border border-red-700 text-red-300{% else %}bg-green-900/30 border border-green-700 text-green-300{% endif %}">{{ m }}</div>
  {% endfor %}{% endif %}
  <form method="post" class="bg-dark-800 border border-dark-700 rounded-xl p-6 grid grid-cols-1 md:grid-cols-2 gap-4">
    {% csrf_token %}
    <div>
      <label class="block text-sm text-gray-300 mb-1">SKU *</label>
      <input name="sku" required value="{{ producto.sku|default:'' }}" class="w-full bg-dark-900 border border-dark-700 rounded px-3 py-2 text-white">
    </div>
    <div>
      <label class="block text-sm text-gray-300 mb-1">Nombre *</label>
      <input name="nombre" required value="{{ producto.nombre|default:'' }}" class="w-full bg-dark-900 border border-dark-700 rounded px-3 py-2 text-white">
    </div>
    <div class="md:col-span-2">
      <label class="block text-sm text-gray-300 mb-1">Descripción</label>
      <textarea name="descripcion" rows="2" class="w-full bg-dark-900 border border-dark-700 rounded px-3 py-2 text-white">{{ producto.descripcion|default:'' }}</textarea>
    </div>
    <div>
      <label class="block text-sm text-gray-300 mb-1">Categoría</label>
      <select name="categoria" class="w-full bg-dark-900 border border-dark-700 rounded px-3 py-2 text-white">
        <option value="">— Sin categoría —</option>
        {% for c in categorias %}
          <option value="{{ c.id }}" {% if producto and producto.categoria_id == c.id %}selected{% endif %}>{{ c.nombre }}</option>
        {% endfor %}
      </select>
    </div>
    <div>
      <label class="block text-sm text-gray-300 mb-1">Valor de compra</label>
      <input name="precio_compra" type="number" step="0.01" min="0" value="{{ producto.precio_compra|default:'0' }}" class="w-full bg-dark-900 border border-dark-700 rounded px-3 py-2 text-white">
    </div>
    <div>
      <label class="block text-sm text-gray-300 mb-1">Valor de venta</label>
      <input name="precio" type="number" step="0.01" min="0" value="{{ producto.precio|default:'0' }}" class="w-full bg-dark-900 border border-dark-700 rounded px-3 py-2 text-white">
    </div>
    <div>
      <label class="block text-sm text-gray-300 mb-1">Stock</label>
      <input name="stock" type="number" min="0" value="{{ producto.stock|default:'0' }}" class="w-full bg-dark-900 border border-dark-700 rounded px-3 py-2 text-white">
    </div>
    <div>
      <label class="block text-sm text-gray-300 mb-1">Stock mínimo</label>
      <input name="stock_minimo" type="number" min="0" value="{{ producto.stock_minimo|default:'0' }}" class="w-full bg-dark-900 border border-dark-700 rounded px-3 py-2 text-white">
    </div>
    <div class="flex items-center gap-2 mt-6">
      <input type="checkbox" id="activo" name="activo" {% if producto.activo or not producto %}checked{% endif %}>
      <label for="activo" class="text-gray-300">Activo</label>
    </div>
    <div class="md:col-span-2 flex justify-end gap-2 pt-4 border-t border-dark-700">
      <a href="{% url 'list_productos' %}" class="px-4 py-2 rounded bg-dark-700 text-white">Cancelar</a>
      <button class="px-4 py-2 rounded bg-olive-600 hover:bg-olive-500 text-white font-semibold">Guardar</button>
    </div>
  </form>
</div>
{% endblock %}
