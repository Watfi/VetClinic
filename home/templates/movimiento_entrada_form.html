{% extends 'base.html' %}
{% block content %}
<div class="max-w-2xl mx-auto space-y-6">
  <div class="flex items-center justify-between">
    <h1 class="text-3xl font-bold text-white flex items-center">
      <i class="fas fa-arrow-down text-green-400 mr-3"></i> Registrar entrada
    </h1>
    <a href="{% url 'list_movimientos' producto.id %}" class="text-gray-400 hover:text-white"><i class="fas fa-arrow-left mr-1"></i>Volver</a>
  </div>
  <p class="text-gray-400">Producto: <span class="text-white font-semibold">{{ producto.nombre }}</span> — Stock actual: <span class="text-olive-400 font-bold">{{ producto.stock }}</span></p>

  {% if messages %}{% for m in messages %}
    <div class="p-4 rounded-lg {% if m.tags == 'error' %}bg-red-900/30 border border-red-700 text-red-300{% else %}bg-green-900/30 border border-green-700 text-green-300{% endif %}">{{ m }}</div>
  {% endfor %}{% endif %}

  <form method="POST" enctype="multipart/form-data" class="bg-dark-800 border border-dark-700 rounded-2xl p-6 space-y-4">
    {% csrf_token %}
    <div class="grid grid-cols-2 gap-4">
      <div>
        <label class="block text-gray-300 mb-1 text-sm font-medium">Cantidad *</label>
        <input type="number" name="cantidad" min="1" required class="w-full bg-dark-900 border border-dark-600 rounded-lg px-4 py-3 text-white focus:outline-none focus:ring-2 focus:ring-green-500">
      </div>
      <div>
        <label class="block text-gray-300 mb-1 text-sm font-medium">Proveedor</label>
        <input type="text" name="proveedor" placeholder="Nombre del proveedor" class="w-full bg-dark-900 border border-dark-600 rounded-lg px-4 py-3 text-white focus:outline-none focus:ring-2 focus:ring-olive-600">
      </div>
    </div>
    <div class="grid grid-cols-2 gap-4">
      <div>
        <label class="block text-gray-300 mb-1 text-sm font-medium">NIT del proveedor</label>
        <input type="text" name="nit_proveedor" placeholder="NIT" class="w-full bg-dark-900 border border-dark-600 rounded-lg px-4 py-3 text-white focus:outline-none focus:ring-2 focus:ring-olive-600">
      </div>
      <div>
        <label class="block text-gray-300 mb-1 text-sm font-medium">Nombre de factura</label>
        <input type="text" name="nombre_factura" placeholder="Nombre / referencia" class="w-full bg-dark-900 border border-dark-600 rounded-lg px-4 py-3 text-white focus:outline-none focus:ring-2 focus:ring-olive-600">
      </div>
    </div>
    <div class="grid grid-cols-2 gap-4">
      <div>
        <label class="block text-gray-300 mb-1 text-sm font-medium">Numero de factura</label>
        <input type="text" name="numero_factura" placeholder="Nro. factura" class="w-full bg-dark-900 border border-dark-600 rounded-lg px-4 py-3 text-white focus:outline-none focus:ring-2 focus:ring-olive-600">
      </div>
      <div>
        <label class="block text-gray-300 mb-1 text-sm font-medium">Fecha de factura</label>
        <input type="date" name="fecha_factura" class="w-full bg-dark-900 border border-dark-600 rounded-lg px-4 py-3 text-white focus:outline-none focus:ring-2 focus:ring-olive-600">
      </div>
    </div>
    <div class="grid grid-cols-2 gap-4">
      <div>
        <label class="block text-gray-300 mb-1 text-sm font-medium">Fecha de pago</label>
        <input type="date" name="fecha_pago" class="w-full bg-dark-900 border border-dark-600 rounded-lg px-4 py-3 text-white focus:outline-none focus:ring-2 focus:ring-olive-600">
      </div>
      <div class="flex items-end pb-1">
        <label class="flex items-center gap-2 text-gray-300 cursor-pointer">
          <input type="checkbox" name="pago_pendiente" class="w-5 h-5 rounded border-dark-600 bg-dark-900 text-olive-600 focus:ring-olive-500">
          <span>Pago pendiente</span>
        </label>
      </div>
    </div>
    <div>
      <label class="block text-gray-300 mb-1 text-sm font-medium">Archivo de factura</label>
      <input type="file" name="archivo_factura" class="w-full bg-dark-900 border border-dark-600 rounded-lg px-4 py-3 text-white file:mr-4 file:py-1 file:px-3 file:rounded file:border-0 file:bg-olive-700 file:text-white file:font-semibold file:cursor-pointer">
    </div>
    <div>
      <label class="block text-gray-300 mb-1 text-sm font-medium">Notas</label>
      <textarea name="notas" rows="2" placeholder="Observaciones..." class="w-full bg-dark-900 border border-dark-600 rounded-lg px-4 py-3 text-white focus:outline-none focus:ring-2 focus:ring-olive-600 resize-none"></textarea>
    </div>
    <button type="submit" class="w-full bg-green-700 hover:bg-green-600 text-white font-semibold py-3 rounded-lg transition-colors">
      <i class="fas fa-check mr-2"></i>Registrar entrada
    </button>
  </form>
</div>
{% endblock %}
