{% extends 'base.html' %}
{% block content %}
<div class="max-w-2xl mx-auto">
  <h1 class="text-3xl font-bold text-white mb-6">
    <i class="fas fa-tag text-olive-500 mr-2"></i>
    {% if categoria %}Editar categoría{% else %}Nueva categoría{% endif %}
  </h1>
  {% if messages %}{% for m in messages %}
    <div class="p-4 rounded-lg mb-4 {% if m.tags == 'error' %}bg-red-900/30 border border-red-700 text-red-300{% else %}bg-green-900/30 border border-green-700 text-green-300{% endif %}">{{ m }}</div>
  {% endfor %}{% endif %}
  <form method="post" class="bg-dark-800 border border-dark-700 rounded-xl p-6 space-y-4">
    {% csrf_token %}
    <div>
      <label class="block text-sm text-gray-300 mb-1">Nombre *</label>
      <input name="nombre" required value="{{ categoria.nombre|default:'' }}" class="w-full bg-dark-900 border border-dark-700 rounded px-3 py-2 text-white">
    </div>
    <div>
      <label class="block text-sm text-gray-300 mb-1">Descripción</label>
      <textarea name="descripcion" rows="3" class="w-full bg-dark-900 border border-dark-700 rounded px-3 py-2 text-white">{{ categoria.descripcion|default:'' }}</textarea>
    </div>
    <div class="flex justify-end gap-2">
      <a href="{% url 'list_categorias' %}" class="px-4 py-2 rounded bg-dark-700 text-white">Cancelar</a>
      <button class="px-4 py-2 rounded bg-olive-600 hover:bg-olive-500 text-white font-semibold">Guardar</button>
    </div>
  </form>
</div>
{% endblock %}
